  <style>
    /* 呼吸动效 */
    @keyframes breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(234, 88, 12, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(234, 88, 12, 0.8); }
    }
    .btn-breathe { animation: breathe 2s infinite ease-in-out; }
    
    /* 扫光动效 (高亮按钮用) */
    @keyframes sweep {
      0% { transform: translateX(-150%) skewX(-15deg); }
      100% { transform: translateX(250%) skewX(-15deg); }
    }
    .animate-sweep { animation: sweep 2.5s infinite ease-in-out; }

    /* 水平照片墙向左无缝滚动 */
    @keyframes scrollHorizontal {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .animate-scroll-x { 
      animation: scrollHorizontal 40s linear infinite; 
      display: flex;
      width: max-content;
    }
    .animate-scroll-x:hover { animation-play-state: paused; }

    /* 水平照片墙向右无缝滚动 */
    @keyframes scrollHorizontalReverse {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }
    .animate-scroll-x-reverse { 
      animation: scrollHorizontalReverse 45s linear infinite; 
      display: flex;
      width: max-content;
    }
    .animate-scroll-x-reverse:hover { animation-play-state: paused; }

    /* 3D 翻转卡片基础样式 (修复移动端镜像问题) */
    .perspective-1000 { 
      perspective: 1000px; 
      /* 移动端触摸事件适配 */ 
      touch-action: manipulation; 
    }
    .transform-style-3d { 
      transform-style: preserve-3d; 
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); 
      /* 修复移动端渲染层级 */ 
      position: relative; 
    }
    .backface-hidden { 
      backface-visibility: hidden; 
      /* 强制硬件加速 + 修复移动端穿透 */ 
      -webkit-backface-visibility: hidden; 
      transform: translateZ(0); 
      -webkit-transform: translateZ(0); 
    }
    .rotate-y-180 { 
      transform: rotateY(180deg) translateZ(1px); /* 新增translateZ避免层级重叠 */ 
      -webkit-transform: rotateY(180deg) translateZ(1px); 
    }
    /* 新增：卡片正面/背面容器强制分层 */ 
    .card-front, .card-back { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
    }
    
    /* 隐藏滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 灵魂微光动效与渐显 */
    @keyframes soulGlow {
      0%, 100% { opacity: 0.8; transform: scale(1); filter: drop-shadow(0 0 10px rgba(168,85,247,0.5)); }
      50% { opacity: 1; transform: scale(1.02); filter: drop-shadow(0 0 25px rgba(168,85,247,0.9)); }
    }
    .animate-soul-glow { animation: soulGlow 3s infinite ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
  </style>
</head>

        }
      } else {
        for(let i=0; i<30; i++) {
          finalImages.push(defaultPlaceholder);
        }
      }
      
      const renderRow = (images) => {
        const doubleImages = [...images, ...images];
        return doubleImages.map((imgSrc) => `
          <div class="h-[180px] md:h-[220px] w-auto flex-shrink-0 rounded-lg border border-white/10 overflow-hidden shadow-lg bg-black/40 flex items-center justify-center">
            <img src="${imgSrc}" loading="lazy" onclick="openImageModal('${imgSrc}')" class="h-full w-auto max-w-none object-contain opacity-90 hover:opacity-100 hover:scale-[1.02] transition-all duration-300 cursor-zoom-in">
          </div>
        `).join('');
      };

      document.getElementById('photo-wall-row-1').innerHTML = renderRow(finalImages.slice(0, 10));
      document.getElementById('photo-wall-row-2').innerHTML = renderRow(finalImages.slice(10, 20));
      document.getElementById('photo-wall-row-3').innerHTML = renderRow(finalImages.slice(20, 30));

      // 5. 右侧公开课标签
      document.getElementById('course-tags-container').innerHTML = PAGE_CONFIG.benefits.courseTags.map(tag => `
        <span class="bg-indigo-500/20 text-indigo-300 text-xs px-3 py-1.5 rounded-full border border-indigo-500/30">${tag}</span>
      `).join('');

      // 6. 课程优势亮点网格渲染 (使用精美的定制化组合图标与升级的卡片样式)
      const customIcons = [
        // 1. 师资 (Teachers) - 蓝紫色系 + 闪星
        `<div class="relative w-16 h-16 mb-6">
           <div class="absolute inset-0 bg-blue-500/20 rounded-[20px] rotate-6 group-hover:rotate-12 transition-transform duration-500"></div>
           <div class="absolute inset-0 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[20px] flex items-center justify-center shadow-[0_10px_20px_rgba(59,130,246,0.4)] transform group-hover:-translate-y-2 transition-transform duration-500">
              <i data-lucide="users" class="w-8 h-8 text-white"></i>
              <i data-lucide="star" class="w-4 h-4 text-yellow-300 absolute -top-1 -right-1 animate-pulse fill-current"></i>
           </div>
         </div>`,
        // 2. AI (AI Tech) - 翠绿色系 + 呼吸节点
        `<div class="relative w-16 h-16 mb-6">
           <div class="absolute inset-0 bg-emerald-500/20 rounded-[20px] -rotate-6 group-hover:-rotate-12 transition-transform duration-500"></div>
           <div class="absolute inset-0 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-[20px] flex items-center justify-center shadow-[0_10px_20px_rgba(16,185,129,0.4)] transform group-hover:-translate-y-2 transition-transform duration-500">
              <i data-lucide="bot" class="w-8 h-8 text-white"></i>
              <span class="absolute top-0 right-0 flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-200 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-400 border border-white"></span>
              </span>
           </div>
         </div>`,
        // 3. 集训 (Camp) - 橙红色系 + 靶心
        `<div class="relative w-16 h-16 mb-6">
           <div class="absolute inset-0 bg-orange-500/20 rounded-[20px] rotate-3 group-hover:rotate-12 transition-transform duration-500"></div>
           <div class="absolute inset-0 bg-gradient-to-br from-orange-500 to-red-600 rounded-[20px] flex items-center justify-center shadow-[0_10px_20px_rgba(249,115,22,0.4)] transform group-hover:-translate-y-2 transition-transform duration-500">
              <i data-lucide="flame" class="w-8 h-8 text-white"></i>
              <i data-lucide="target" class="w-5 h-5 text-orange-200 absolute -bottom-2 -right-2"></i>
           </div>
         </div>`,
        // 4. 1对1 (1-on-1) - 粉红色系 + 弹跳微光
        `<div class="relative w-16 h-16 mb-6">
           <div class="absolute inset-0 bg-pink-500/20 rounded-[20px] -rotate-3 group-hover:-rotate-12 transition-transform duration-500"></div>
           <div class="absolute inset-0 bg-gradient-to-br from-pink-500 to-rose-600 rounded-[20px] flex items-center justify-center shadow-[0_10px_20px_rgba(236,72,153,0.4)] transform group-hover:-translate-y-2 transition-transform duration-500">
              <i data-lucide="heart-handshake" class="w-8 h-8 text-white"></i>
              <i data-lucide="sparkles" class="w-4 h-4 text-pink-200 absolute top-1 right-1 animate-bounce"></i>
           </div>
         </div>`
      ];

      document.getElementById('course-features-grid').innerHTML = PAGE_CONFIG.courseIntro.features.map((feat, index) => `
        <div class="bg-white/5 rounded-3xl p-8 border border-white/10 hover:bg-white/10 hover:border-white/20 transition-all duration-300 group relative overflow-hidden flex flex-col h-full shadow-lg">
           <!-- 背景微光 -->
           <div class="absolute top-0 right-0 w-40 h-40 bg-white/5 rounded-full blur-[50px] group-hover:bg-white/10 transition-colors pointer-events-none"></div>
           
           ${customIcons[index]}
           
           <h3 class="text-xl font-bold text-white mb-3 relative z-10">${feat.title}</h3>
           <p class="text-sm text-gray-400 leading-relaxed mb-6 relative z-10 flex-grow">${feat.desc}</p>
           
           <div class="flex flex-wrap gap-2 mt-auto relative z-10">
             ${feat.tags.map(tag => `<span class="bg-white/10 text-gray-300 text-xs px-3 py-1.5 rounded-lg border border-white/5 group-hover:border-white/20 transition-colors">${tag}</span>`).join('')}
           </div>
        </div>
      `).join('');

      // 确保渲染完成后，新加入的自定义带 class 的图标节点也能正常转化为 svg
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      } else {
        console.warn("Lucide icons failed to load.");
      }
    }

    // --- 倒计时与交互逻辑 ---
    function startTimer() {
      // 获取活动目标下线时间
      const targetDateStr = PAGE_CONFIG.base.targetDate;
      const targetDate = new Date(targetDateStr).getTime();
      
      // 获取用于累计人数算法的时间点和人数
      const startT = new Date(PAGE_CONFIG.mbti.participantStartDate).getTime();
      const endT = new Date(PAGE_CONFIG.mbti.participantEndDate).getTime();
      const startC = PAGE_CONFIG.mbti.participantStartCount;
      const endC = PAGE_CONFIG.mbti.participantTargetCount;

      function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;
        
        // 更新页面倒计时
        if (distance >= 0) {
          document.getElementById('t-days').innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
          document.getElementById('t-hours').innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
          document.getElementById('t-minutes').innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
          document.getElementById('t-seconds').innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }

        // ==========================================
        // 根据时间进度平滑、确定性地计算当前总参与人数
        // ==========================================
        let currentCount = startC;
        if (now >= endT) {
            currentCount = endC;
        } else if (now > startT) {
            const progress = (now - startT) / (endT - startT);
            // 线性插值，随着时间稳定推移上涨
            currentCount = Math.floor(startC + progress * (endC - startC));
        }

        const countEl = document.getElementById('txt-mbti-count');
        if (countEl) countEl.innerText = currentCount.toLocaleString();
      }
      
      setInterval(updateTimer, 1000);
      updateTimer();
    }

    const wechatModal = document.getElementById('wechat-modal');
    function openWechatModal() { wechatModal.classList.remove('hidden'); }
    function closeWechatModal() { wechatModal.classList.add('hidden'); }

    // 图片预览逻辑
    const imageModal = document.getElementById('image-modal');
    const imageModalImg = document.getElementById('image-modal-img');
    function openImageModal(src) {
      imageModalImg.src = src;
      imageModal.classList.remove('hidden');
      setTimeout(() => {
        imageModalImg.classList.remove('scale-95');
        imageModalImg.classList.add('scale-100');
      }, 10);
    }
    function closeImageModal() {
      imageModalImg.classList.remove('scale-100');
      imageModalImg.classList.add('scale-95');
      setTimeout(() => {
        imageModal.classList.add('hidden');
        imageModalImg.src = '';
      }, 300);
    }

    // 翻转卡片函数
    function flipCard(el) {
      // 适配移动端触摸/点击事件
      if (el.style.transform === 'rotateY(180deg)') {
        el.style.transform = 'rotateY(0deg)';
        el.style.webkitTransform = 'rotateY(0deg)'; // 兼容webkit内核
      } else {
        el.style.transform = 'rotateY(180deg)';
        el.style.webkitTransform = 'rotateY(180deg)'; // 兼容webkit内核
      }
    }

    // MBTI 逻辑
    const mbtiModal = document.getElementById('mbti-modal');
    const mbtiContent = document.getElementById('mbti-content');
    let mbtiStep = 0;
    let mbtiScore = 0;
    let isMbtiLoading = false;
    let loadingText = "";

    function renderMbtiStep() {
      const mbtiCfg = PAGE_CONFIG.mbti;
      
      if (isMbtiLoading) {
        mbtiContent.innerHTML = `
          <div class="text-center py-16 flex flex-col items-center justify-center min-h-[300px]">
             <div class="relative w-24 h-24 mb-8">
               <div class="absolute inset-0 border-4 border-purple-500/20 rounded-full"></div>
               <div class="absolute inset-0 border-4 border-purple-400 border-t-transparent rounded-full animate-spin"></div>
               <i data-lucide="dna" class="absolute inset-0 m-auto text-purple-400 w-10 h-10 animate-pulse"></i>
             </div>
             <p class="text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-pink-300 animate-pulse text-xl font-bold tracking-widest">${loadingText}</p>
          </div>
        `;
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
        return;
      }

      if (mbtiStep < mbtiCfg.questions.length) {
        const q = mbtiCfg.questions[mbtiStep];
        const pct = ((mbtiStep) / mbtiCfg.questions.length) * 100;
        
        mbtiContent.innerHTML = `
          <div class="mb-8 mt-2">
            <div class="flex justify-between items-center mb-3">
              <span class="text-purple-300 text-sm font-bold tracking-widest">灵魂拟态解析中...</span>
              <span class="text-xs text-purple-400 font-mono bg-purple-900/50 px-2.5 py-1 rounded">${mbtiStep + 1} / ${mbtiCfg.questions.length}</span>
            </div>
            <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
              <div class="bg-gradient-to-r from-purple-600 to-pink-500 h-full transition-all duration-500 ease-out shadow-[0_0_10px_rgba(236,72,153,0.5)]" style="width: ${pct}%"></div>
            </div>
          </div>
          <h3 class="text-2xl font-bold text-white mb-8 leading-relaxed">${q.q}</h3>
          <div class="flex flex-col gap-4">
            ${q.options.map(opt => `
              <button onclick="handleMbtiAnswer(${opt.score})" class="w-full text-left px-6 py-5 rounded-xl bg-white/5 border border-white/10 hover:bg-purple-600/30 hover:border-purple-400/50 hover:shadow-[0_0_15px_rgba(168,85,247,0.2)] transition-all text-base text-gray-200 cursor-pointer flex items-center gap-3 active:scale-[0.98]">
                <div class="w-2 h-2 rounded-full bg-purple-500/50 flex-shrink-0"></div>
                ${opt.text}
              </button>
            `).join('')}
          </div>
        `;
      } else {
        const res = mbtiCfg.results.find(r => mbtiScore >= r.min && mbtiScore <= r.max) || mbtiCfg.results[0];
        mbtiContent.innerHTML = `
          <div class="text-center py-4 animate-fade-in">
            <div class="text-7xl mb-4 filter drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]">${res.icon}</div>
            <h3 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-5 tracking-wide">${res.name}</h3>
            
            <div class="bg-white/5 p-5 rounded-2xl border border-white/10 mb-6 text-left shadow-inner">
              <span class="text-xs text-purple-300 font-bold mb-2 flex items-center gap-1.5"><i data-lucide="fingerprint" class="w-4 h-4"></i> 灵魂素描</span>
              <p class="text-sm text-gray-200 leading-relaxed">${res.sketch}</p>
            </div>
            
            <!-- 痛点遮挡转化区 -->
            <div class="relative bg-[#1a1125] p-5 rounded-2xl border border-red-500/20 text-left overflow-hidden">
               <div class="blur-[5px] opacity-60 select-none pointer-events-none transition-all duration-1000">
                 <span class="text-xs text-red-400 font-bold mb-2 flex items-center gap-1.5"><i data-lucide="alert-triangle" class="w-4 h-4"></i> 致命盲区</span>
                 <p class="text-sm text-gray-200 leading-relaxed mb-4">${res.blindSpot}</p>
                 <span class="text-xs text-green-400 font-bold mb-2 flex items-center gap-1.5"><i data-lucide="target" class="w-4 h-4"></i> 专属规划</span>
                 <p class="text-sm text-gray-200 leading-relaxed">${res.actionText}</p>
               </div>
               
               <!-- 悬浮解锁按钮 -->
               <div class="absolute inset-0 flex items-center justify-center bg-gradient-to-t from-[#1a1125] via-[#1a1125]/80 to-transparent">
                 <button onclick="closeMbtiModal(); openWechatModal();" class="btn-breathe bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3.5 px-6 rounded-full shadow-[0_0_20px_rgba(239,68,68,0.4)] text-sm flex items-center gap-2 hover:scale-105 transition-transform">
                   <i data-lucide="lock" class="w-4 h-4"></i> 解锁我的 1V1 破局规划 (免费)
                 </button>
               </div>
            </div>
          </div>
        `;
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
      }
    }

    function openMbtiModal() { 
      mbtiStep = 0; 
      mbtiScore = 0;
      isMbtiLoading = false;
      if ('vibrate' in navigator) navigator.vibrate(50);
      renderMbtiStep(); 
      mbtiModal.classList.remove('hidden'); 
    }

    function closeMbtiModal() { mbtiModal.classList.add('hidden'); }
    
    function handleMbtiAnswer(score) { 
      if ('vibrate' in navigator) navigator.vibrate(30);
      mbtiScore += score;
      mbtiStep++; 
      
      if (mbtiStep >= PAGE_CONFIG.mbti.questions.length) {
        isMbtiLoading = true;
        loadingText = "正在解析你的抗压阈值...";
        renderMbtiStep();
        
        setTimeout(() => {
          loadingText = "正在生成专属上岸侧写...";
          renderMbtiStep();
          
          setTimeout(() => {
            isMbtiLoading = false;
            renderMbtiStep();
          }, 1500);
        }, 1500);
      } else {
        renderMbtiStep(); 
      }
    }

    window.onload = () => { initPage(); startTimer(); };
  </script>
</body>
</html>
